name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Publish
        run: dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ./publish

      - name: Create zip
        shell: pwsh
        run: |
          Compress-Archive -Path ./publish/* -DestinationPath ./artifacts/H3CSwitchPortMonitor-${{ github.ref_name }}-win-x64.zip -Force
          mkdir -p ./artifacts
          Compress-Archive -Path ./publish/* -DestinationPath ./artifacts/H3CSwitchPortMonitor-${{ github.ref_name }}-win-x64.zip -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: artifacts/*.zip

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
